services:
  app:
    build: .
    container_name: dental_clinic_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: dental_clinic
      DB_USERNAME: ${DB_USERNAME:-dental_user}
      DB_PASSWORD: ${DB_PASSWORD:-dental_password}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: dental_clinic_db
    restart: unless-stopped
    ports:
      - "${DB_PORT_ON_HOST:-3307}:3306"
    environment:
      MYSQL_DATABASE: dental_clinic
      MYSQL_USER: ${DB_USERNAME:-dental_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dental_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data: