version: '3.8'

services:
  web:
    build: .
    container_name: clinic_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: clinic_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dental_clinic
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: