<!DOCTYPE html>

<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Nha Khoa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
        <div class="text-center mb-6">
            <i class="fa-solid fa-tooth text-4xl text-blue-600 mb-2"></i>
            <h1 class="text-2xl font-bold">Đăng Nhập Hệ Thống Quản Lý Nha Khoa</h1>
           
        </div>

```
    <form onsubmit="handleLogin(event)">
        <input type="text" id="user" placeholder="Tên đăng nhập"
            class="w-full mb-4 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" required>

        <input type="password" id="pass" placeholder="Mật khẩu"
            class="w-full mb-6 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" required>

        <button type="submit"
            class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700">
            Đăng Nhập
        </button>
    </form>
</div>

<script>
    // Nếu đã đăng nhập thì chuyển luôn sang dashboard
    if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }

   async function handleLogin(e) {
    e.preventDefault();
    
    // 1. Lấy thông tin và reset thông báo
    const username = document.getElementById('user').value;
    const password = document.getElementById('pass').value;
    console.log("🚀 Đang gửi yêu cầu đăng nhập...");

    try {
        const res = await fetch('/public/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        // 2. Kiểm tra xem Server có trả về JSON không
        const contentType = res.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            const textLoi = await res.text(); // Lấy nội dung lỗi thực tế (có thể là lỗi PHP)
            console.error("Server trả về không phải JSON:", textLoi);
            throw new Error("Server trả về lỗi định dạng (không phải JSON).");
        }

        const result = await res.json(); // Đổi tên từ 'data' thành 'result' để tránh nhầm
        console.log("📦 Dữ liệu từ Server:", result);

        // 3. Xử lý logic nghiệp vụ
        if (result.status === 'success') {
            // Dùng biến tạm để truy cập túi dữ liệu bên trong
            const payload = result.data; 

            if (payload && payload.token && payload.user) {
                // Lưu dữ liệu
                localStorage.setItem('token', payload.token);
                localStorage.setItem('role', payload.user.role);
                localStorage.setItem('fullName', payload.user.full_name);
                
                console.log("✅ Đăng nhập thành công!");
                window.location.href = 'dashboard.html';
            } else {
                throw new Error("Dữ liệu trả về thiếu trường 'token' hoặc 'user'.");
            }
        } else {
            // Hiện thông báo lỗi cụ thể từ Backend (ví dụ: "Sai mật khẩu")
            alert("Thất bại: " + (result.message || "Tài khoản không chính xác"));
        }

    } catch (err) {
        // 4. Phân loại lỗi để báo cho người dùng chính xác
        console.error("❌ Lỗi chi tiết:", err);
        
        if (err.message.includes("JSON")) {
            alert("Lỗi Server: Phản hồi không đúng định dạng.");
        } else if (err.message.includes("fetch")) {
            alert("Lỗi mạng: Không thể kết nối tới API. Hãy kiểm tra XAMPP!");
        } else {
            alert("Lỗi hệ thống: " + err.message);
        }
    }
}
</script>
```
